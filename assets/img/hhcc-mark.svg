<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">HHCC mark</title>
  <desc id="desc">Compact mark matching the provided HHCC image.</desc>
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18466d"/>
      <stop offset="100%" stop-color="#0b2f52"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d77f"/>
      <stop offset="100%" stop-color="#c99d42"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity=".12"/>
    </filter>
    <filter id="shapeShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="8" y="8" width="144" height="144" rx="18" fill="#fcfaf4"/>
  </g>

  <g filter="url(#shapeShadow)">
    <path d="M54 34 L66 26 L66 118 L54 126 Z" fill="url(#goldGrad)"/>

    <path fill="url(#goldGrad)" fill-rule="evenodd"
          d="M96 32
             A46 46 0 1 1 96 128
             A46 46 0 1 1 96 32
             Z
             M96 50
             A28 28 0 1 0 96 110
             A28 28 0 1 0 96 50
             Z"/>
    <rect x="110" y="58" width="36" height="42" fill="#fcfaf4"/>

    <path d="M32 52 L44 44 L44 122 L32 114 Z" fill="url(#blueGrad)"/>
    <path d="M44 70 H92 V84 H44 Z" fill="url(#blueGrad)"/>
    <path d="M92 30 L104 38 L104 102 Q104 108 99 110 L92 106 Z" fill="url(#blueGrad)"/>
    <path d="M88 120 H103 L92 128 H88 Z" fill="url(#blueGrad)"/>
  </g>
</svg>
